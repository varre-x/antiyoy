<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antiyoy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby">
        <input type="text" placeholder="Enter your name" id="nameField"> <br>
        <button id="joinBtn">Join Game</button>
    </div>

    <div id="startDiv" class="collapse">
        <li id="playerList">

        </li>
        <button id="startBtn">Start Game</button>
    </div>
    <button id="farm" class="collapse button"><span>14</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
    <button id="tower" class="collapse button"><span>15</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
    <button id="fortress" class="collapse button"><span>35</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
    <button id="peasant" class="collapse button"><span>10</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
    <button id="spearman" class="collapse button"><span>20</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
    <button id="baron" class="collapse button"><span>30</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
    <button id="knight" class="collapse button"><span>40</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
    <button id="endTurnBtn" class="collapse button"><span>End Turn</span></button>
<!--https://tinkr.tech/sdb_apps/antiyoy/images/building_farm.svg-->
    <div id="container"></div>
    <script src="script.js"></script>
</body>
</html>
