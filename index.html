<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antiyoy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby">
        <input type="text" placeholder="Enter your name" id="nameField"> <br>
        <button id="joinBtn">Join Game</button>
    </div>

    <div id="startDiv" class="collapse">
        <ul id="playerList"></ul>
        <button id="startBtn">Start Game</button>
    </div>

    <div id="menu" class="menu collapse">
        <div class="menuContent">
            <h2>Menu</h2>
            <button id="ffBtn">Surrender</button><br>
            <button id="resumeBtn">Back</button>
        </div>
    </div>

    <div id="moneyDiv" class="collapse">
        <span id="money"></span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin">
        <p id="income"></p>
    </div>
    
    <div id="gameBtns">
        <button data-tool="farm" id="farm" class="ubBtn collapse button"><span>14</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
        <button data-tool="tower" id="tower" class="ubBtn collapse button"><span>15</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
        <button data-tool="fortress" id="fortress" class="ubBtn collapse button"><span>35</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
        <button data-tool="peasant" id="peasant" class="ubBtn collapse button"><span>10</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
        <button data-tool="spearman" id="spearman" class="ubBtn collapse button"><span>20</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
        <button data-tool="baron" id="baron" class="ubBtn collapse button"><span>30</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
        <button data-tool="knight" id="knight" class="ubBtn collapse button"><span>40</span><img src="https://tinkr.tech/sdb_apps/antiyoy/images/coin.svg" alt="$" class="smallCoin"></button>
        <button id="endTurnBtn" class="collapse button"><span>End Turn</span></button>
    </div>

    <div id="container"></div>

    <script src="script.js"></script>
</body>
</html>
