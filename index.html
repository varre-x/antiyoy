<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antiyoy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby">
        <input type="text" placeholder="Enter your name" id="nameField"> <br>
        <button id="joinBtn">Join Game</button>
    </div>

    <div id="startDiv" class="invisible">
        <li id="playerList">

        </li>
        <button id="startBtn">Start Game</button>
    </div>
    <button id="farm" class="invisible">Farm</button>
    <button id="tower" class="invisible">Tower</button>
    <button id="fortress" class="invisible">Fortress</button>
    <button id="peasant" class="invisible">Peasant</button>
    <button id="spearman" class="invisible">Spearman</button>
    <button id="baron" class="invisible">Baron</button>
    <button id="knight" class="invisible">Knight</button>
    <button id="endTurnBtn" class="invisible">End Turn</button>
    
    <div id="container"></div>
    <script src="script.js"></script>
</body>
</html>
